<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MusicXML Display</title>
    <script src="OSMD_1_9_7.min.js"></script>
    <style>
        html {
            background-color: #f0f0f0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }
        #osmdContainer {
            width: 100%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }
        /* Style for SVG pages generated by the library */
        svg {
            background-color: white !important;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: block !important;

            max-width: 100% !important;
            width: 100% !important;
            height: auto !important;
        }
        #spinner {
            position: fixed;
            top: 50%; left: 50%;
            width: 40px; height: 40px;
            margin: -20px 0 0 -20px;
            border: 4px solid #ccc;
            border-top-color: #555;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="spinner"></div>
    <div id="osmdContainer"></div>
    <script>
        let osmd = null;
        let currentTranspose = 0;
        let baseSystemCount = null;

        // Maximum zoom to try. The binary search will find the highest zoom
        // where OSMD does not need to add systems beyond the XML-defined ones.
        const MAX_ZOOM = 1.0;

        function countSystems(o) {
            return o.graphic.MusicPages.reduce(
                (sum, page) => sum + page.MusicSystems.length, 0
            );
        }

        // Counts XML-defined system breaks without rendering.
        // Uses getElementsByTagName to avoid XML namespace issues with querySelectorAll.
        function countSystemsFromXml(xmlText) {
            const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
            const parts = doc.getElementsByTagName('part');
            if (!parts.length) return 1;
            const prints = parts[0].getElementsByTagName('print');
            let breaks = 0;
            for (const p of prints) {
                if (p.getAttribute('new-system') === 'yes' || p.getAttribute('new-page') === 'yes') {
                    breaks++;
                }
            }
            return 1 + breaks;
        }

        // Finds and applies the maximum zoom where system count stays at baseSystemCount.
        // Starts binary search from lo=0.1, hi=MAX_ZOOM — no wasted MAX_ZOOM probe render.
        async function autoFitAndRender() {
            if (!osmd || baseSystemCount === null) return;

            let lo = 0.1, hi = MAX_ZOOM;
            for (let i = 0; i < 4; i++) {
                const mid = (lo + hi) / 2;
                osmd.zoom = mid;
                osmd.render();
                const systems = countSystems(osmd);
                const fits = systems <= baseSystemCount;
                console.log(`[perf] iter ${i}: mid=${mid}, systems=${systems}, fits=${fits}, lo=${lo}, hi=${hi}`);
                if (fits) lo = mid; else hi = mid;
            }
            osmd.zoom = lo;
            console.log("[perf] Osmd zoom is " + osmd.zoom);
            osmd.render();
        }

        async function initializeDisplay() {
            const opts = {
                backend:                                      "svg",
                autoResize:                                   false,
                disableCursor:                                true,
                preferredSkyBottomLineBatchCalculatorBackend: 1,
                drawTitle:                                    true,
                drawComposer:                                 true,
                drawCredits:                                  true,
                drawMeasureNumbers:                           false,
                pageFormat:                                   "Endless",
                newSystemFromXML:                             true,
                newSystemFromNewPageInXML:                    true,
                newPageFromXML:                               false,
            };
            osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay("osmdContainer", opts);
            osmd.TransposeCalculator = new opensheetmusicdisplay.TransposeCalculator();

            const er = osmd.EngravingRules;
            er.RenderPartNames                         = false;
            er.RenderPartAbbreviations                 = false;
            er.SystemLabelsRightMargin                 = 0;
            er.PageTopMargin                           = 5;
            er.PageLeftMargin                          = 5;
            er.PageRightMargin                         = 5;
            er.SlurHeightFactor                        = 0.7;
            er.SlurHeightFlattenLongSlursFactorByWidth = 0.24;
            er.StaffDistance                           = 7.0;
            er.BetweenStaffDistance                    = 10.0;
            er.MinimumDistanceBetweenSystems           = 10.0;
            er.MinSkyBottomDistBetweenSystems          = 3.0;
            er.LyricsHeight                            = 2.0;
            er.VerticalBetweenLyricsDistance           = 0.0;
            er.RenderCopyright                         = true;
            er.SheetCopyrightHeight                    = 2.5;
            er.SheetCopyrightMargin                    = 2.5;
            er.SheetTitleHeight                        = 3;
            er.SystemLyricistDistance                  = 10;
            er.StretchLastSystemLine                   = true;
        }

        async function waitForLayout() {
            const container = document.getElementById('osmdContainer');
            while (container.clientWidth <= 0) {
                await new Promise(r => requestAnimationFrame(r));
            }
        }

        async function loadMusicXmlFile(fileUrl) {
            try {
                await waitForLayout();
                await initializeDisplay();

                let xmlContent;
                if (fileUrl.startsWith('data:')) {
                    // Decode base64 data URL to XML text for offline loading
                    const response = await fetch(fileUrl);
                    xmlContent = await response.text();
                } else {
                    xmlContent = fileUrl;
                }

                const t0 = performance.now();

                await osmd.load(xmlContent);
                console.log(`[perf] load: ${((performance.now() - t0) / 1000).toFixed(2)}s`);

                // Count XML-defined systems statically — no render needed
                baseSystemCount = countSystemsFromXml(xmlContent);
                console.log(`[perf] baseSystemCount (xml): ${baseSystemCount} systems, ${((performance.now() - t0) / 1000).toFixed(2)}s`);

                await autoFitAndRender();
                console.log(`[perf] autoFitAndRender: ${((performance.now() - t0) / 1000).toFixed(2)}s`);

                // Restore saved transposition without triggering the Flutter callback
                if (currentTranspose !== 0) {
                    await updateTranspose(currentTranspose);
                }

                document.getElementById('spinner').style.display = 'none';
                console.log(`[perf] total: ${((performance.now() - t0) / 1000).toFixed(2)}s`);
            } catch (error) {
                console.error('Error loading MusicXML file:', error);
            }
        }

        function transposeUp() {
            updateTranspose(currentTranspose + 1);
        }

        function transposeDown() {
            updateTranspose(currentTranspose - 1);
        }

        function resetTranspose() {
            updateTranspose(0);
        }

        async function updateTranspose(val) {
            if (!osmd) return;
            currentTranspose = Math.max(-12, Math.min(12, val));
            try {
                osmd.Sheet.Transpose = currentTranspose;
                osmd.updateGraphic();
                osmd.render();
                TransposeChannel.postMessage(String(currentTranspose));
            } catch (e) {
                console.error('Transpose error:', e);
            }
        }

        window.initSheet = async function(fileUrl, transposition) {
            currentTranspose = transposition;
            await loadMusicXmlFile(fileUrl);
        };
    </script>
</body>
</html>
